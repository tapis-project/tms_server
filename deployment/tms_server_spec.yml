          type: string
        app_version:
          type: string
        client_id:
          type: string
        enabled:
          type: integer
          format: int32
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
    DelegationsListElement:
      type: object
      required:
      - id
      - tenant
      - client_id
      - client_user_id
      - expires_at
      - created
      - updated
      properties:
        id:
          type: integer
          format: int32
        tenant:
          type: string
        client_id:
          type: string
        client_user_id:
          type: string
        expires_at:
          type: string
          format: date-time
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
    HostsListElement:
      type: object
      required:
      - id
      - tenant
      - host
      - addr
      - created
      - updated
      properties:
        id:
          type: integer
          format: int32
        tenant:
          type: string
        host:
          type: string
        addr:
          type: string
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
