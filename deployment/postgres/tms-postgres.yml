---
version: "3"

volumes:
  tms-postgres-18-data:

services:
# Postgres for TMS
  tms-postgres:
    image: docker.io/library/postgres:18.3
    container_name: tms-postgres
    labels:
      name: tms-postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - tms-postgres-18-data:/var/lib/postgresql/data_tms
    networks:
      - frontend-net

networks:
  # Frontend network for public-facing services
  frontend-net:
    driver: bridge