openapi: 3.1.0
info:
  title: Trust Manager System (TMS) Server
  description: |
    The Trust Manager System (TMS) server provides for management of credentials by a trusted application client.
  version: '0.3.0'
  termsOfService: "https://tapis-project.org"
  contact:
    name: "TMS Server - CICSupport"
    url: "https://tapis-project.org"
    email: "cicsupport@tacc.utexas.edu"
  license:
    name: 3-Clause BSD License
    url: 'https://opensource.org/licenses/BSD-3-Clause'
externalDocs:
  description: Tapis Project
  url: 'https://tapis-project.org'
servers:
  - url: 'http://localhost:3000/'
    description: Local test environment
    variables: {}
tags:
  - name: General
    description: General service health and readiness
  - name: Credentials
    description: Manage access credentials

# ------------------------------------------------------------------------------
# --- Paths -------------------------------------------------------------------
# ------------------------------------------------------------------------------
paths:

  # --- sayHello and getVersion ------------------------------------------------
  '/tms/hello':
    get:
      tags:
        - General
      description: Lightweight non-authenticated echo of a query parameter.
      operationId: sayHello
      parameters:
        - name: name
          schema:
            type: string
          in: query
      responses:
        '200':
          description: Success.
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
  '/tms/version':
    get:
      tags:
        - General
      description: Return the server version.
      operationId: getVersion
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespVersion'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'

  # --- createSshKeypair -------------------------------------------------------
  '/tms/pubkeys/creds':
    post:
      tags:
        - Credentials
      description: |
        Create an ssh keypair using specified values for client user, host, host account, number of user, TTL minutes
        and key type. All values are required except for key type, which defaults to ED25519. Supported values for
        key type: ED25519, ECDSA, RSA.
        
        Setting number of uses or TTL minutes to a negative value results in maximum limits. If both are negative
        this effectively creates a keypair with no limits. If both are specified as 0 then the resulting key is
        not usable.
      operationId: createSShKeypair
      requestBody:
        required: true
        description: A JSON object specifying information about the SSH keypair ot be generated.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReqNewSshKeypair'
      responses:
        '201':
          description: System created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespNewSshKeypair'

  # --- retrievePubKey --------------------------------------------------------------
  '/tms/pubkeys/creds/retrieve':
    post:
      tags:
        - Credentials
      description: |
        Retrieve public key Create a system using a request body. System name must be unique within a tenant and can be composed of
        alphanumeric characters and the following special characters [-._~].
        Name must begin with an alphanumeric character and can be no more than 80 characters in length.
        Description is optional with a maximum length of 2048 characters.
      operationId: retrievePubKey
      parameters:
        - name: skipCredentialCheck
          in: query
          description: Bypass initial credential validation (for LINUX and S3). Default is false.
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        description: A JSON object specifying information about the SSH keypair ot be generated.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReqGetPublicKey'

# ------------------------------------------------------------------------------
# --- Components ---------------------------------------------------------------
# ------------------------------------------------------------------------------
components:
#  securitySchemes:
#    TapisJWT:
#      type: apiKey
#      description: Tapis signed JWT token authentication
#      name: X-Tapis-Token
#      in: header
  schemas:
    # ------------------------------------------------------------------------------
    # --- Model objects ------------------------------------------------------------
    # ------------------------------------------------------------------------------
    # --- TapisSystem ------------------------------------------------------------------
#    TapisSystem:
#      type: object
#      properties:
#        tenant:
#          type: string

    # --- String types with constraints ------------------------------------
    SysHost:
      type: string
      minLength: 1
      maxLength: 256
      description: FQDN, IP address, Globus endpoint ID or Globus collection ID.
    HostString:
      type: string
      minLength: 1
      maxLength: 256
    SysId:
      type: string
      minLength: 1
      maxLength: 80
      description: Short descriptive name for the system that is unique within the tenant.
    UserNameString:
      type: string
      minLength: 1
      maxLength: 60
    DescriptionString:
      type: string
      maxLength: 2048
      description: Optional more verbose description.

    # -------------------------------------------------------------------------
    # --- Request objects -----------------------------------------------------
    # -------------------------------------------------------------------------
    ReqNewSshKeypair:
      type: object
      required:
        - client_user_id
        - host
        - host_account
        - num_uses
        - ttl_minutes
      properties:
        client_user_id:
          type: string
          description: User associated with the Resource Provider
        host:
          type: string
          description: FQDN for the host where the user has an account.
        host_account:
          type: string
          description: Username of the host account.
        num_uses:
          type: integer
          format: int32
        ttl_minutes:
          type: integer
          format: int32
        key_type:
          type: string
    ReqGetPublicKey:
      type: object
      required:
        - user
        - host
        - public_key_fingerprint
      properties:
        user:
          type: string
          description: Username of the host account.
        user_uid:
          type: string
          description: UID of the host account. Info only. Not used for lookup.
        host:
          type: string
          description: FQDN for the host where the user has an account.
        public_key_fingerprint:
          type: string
          description: Fingerprint of the SSH public key.
        key_type:
          type: string
          description: Type of SSH Key. For example ssh-ed25519 or ssh-rsa. Info only. Not used for lookup.

    # -------------------------------------------------------------------------
    # --- Response objects ----------------------------------------------------
    # -------------------------------------------------------------------------
    RespVersion:
      type: object
      required:
        - result_code
        - result_msg
        - tms_version
        - git_branch
        - git_commit
        - git_dirty
        - source_ts
        - rustc_version
      properties:
        result_code:
          type: string
        result_msg:
          type: string
        tms_version:
          type: string
        git_branch:
          type: string
        git_commit:
          type: string
        git_dirty:
          type: string
        source_ts:
          type: string
        rustc_version:
          type: string
    HttpResult:
      type: object
      required:
        - result_code
        - result_msg
      properties:
        result_code:
          type: string
        result_msg:
          type: string
    RespNewSshKeypair:
      type: object
      required:
        - result_code
        - result_msg
        - private_key
        - public_key
        - public_key_fingerprint
        - key_type
        - key_bits
        - max_uses
        - remaining_uses
        - expires_at
      properties:
        result_code:
          type: string
        result_msg:
          type: string
        private_key:
          type: string
        public_key:
          type: string
        public_key_fingerprint:
          type: string
        key_type:
          type: string
        key_bits:
          type: string
        max_uses:
          type: string
        remaining_uses:
          type: string
        expires_at:
          type: string
          format: date-time
    RespPublicKey:
      type: object
      required:
        - result_code
        - result_msg
        - public_key
      properties:
        result_code:
          type: string
        result_msg:
          type: string
        public_key:
          type: string

    # -------------------------------------------------------------------------
    # --- Enums ---------------------------------------------------------------
    # -------------------------------------------------------------------------
    SshKeyTypeEnum:
      type: string
      description: Type of ssh key
      enum:
        - ED25519
        - RSA
        - ECDSA